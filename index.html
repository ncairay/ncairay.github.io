<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCAISM - App Developer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #333;
      background: #faf9ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    h1 {
      font-size: 2rem;
      color: #7F77DD;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 48px;
    }

    h2 {
      font-size: 1.1rem;
      color: #7F77DD;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .app-list {
      list-style: none;
      margin-bottom: 48px;
    }

    .app-list li {
      background: #fff;
      border: 1px solid #ece9f7;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: box-shadow 0.2s;
    }

    .app-list li:hover {
      box-shadow: 0 4px 16px rgba(127, 119, 221, 0.12);
    }

    .app-name {
      font-weight: 600;
      font-size: 1rem;
      color: #333;
    }

    .app-list a {
      font-size: 0.85rem;
      color: #7F77DD;
      text-decoration: none;
      white-space: nowrap;
    }

    .app-list a:hover {
      text-decoration: underline;
    }

    .contact {
      margin-top: 8px;
    }

    .contact a {
      color: #7F77DD;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <main>
    <h1>NCAISM</h1>
    <p class="subtitle">
      Hong Kong indie app developer. Creator of GiftIdea AI Gift Finder,
      &#40664;&#26360;&#30343; SpellBee, and Pok&eacute;Dex HK.
    </p>

    <h2>Apps</h2>
    <ul class="app-list">
      <li>
        <span class="app-name">GiftIdea - AI Gift Finder</span>
        <a href="https://ncairay.github.io/giftidea-privacy">Privacy Policy</a>
      </li>
      <li>
        <span class="app-name">&#40664;&#26360;&#30343; SpellBee</span>
        <a href="https://ncairay.github.io/spellbee-privacy">Privacy Policy</a>
      </li>
      <li>
        <span class="app-name">&#20659;&#21934; Flyers</span>
        <a href="https://ncairay.github.io/flyers-privacy">Privacy Policy</a>
      </li>
    </ul>

    <h2>Contact</h2>
    <p class="contact">
      <a href="mailto:ncairay@gmail.com">ncairay@gmail.com</a>
    </p>
  </main>

  <footer>&copy; 2025 NCAISM. All rights reserved.</footer>
</body>
</html>
